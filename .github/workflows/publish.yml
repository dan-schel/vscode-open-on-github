name: Publish

on:
  push:
    branches:
      - master

jobs:
  publish-vsce:
    name: Publish to Visual Studio Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
      - run: npm ci
      - name: Publish
        run: npm run publish-vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
  publish-ovsx:
    name: Publish to Open VSX Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
      - run: npm ci
      - name: Publish
        run: npm run publish-ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
  release:
    name: Publish as GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - run: echo "PACKAGE_VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        id: version
      - uses: actions/setup-node@v6
        with:
          node-version: 24.13.1
      - run: npm ci
      - run: npm run create-vsix
      - uses: xresloader/upload-to-github-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: "*.vsix"
          draft: false
          tag_name: ${{ steps.version.outputs.PACKAGE_VERSION }}
